<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Promises</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations.css" />

  <style>
    body {
      background:#fff5f7 url('assets/nano/bg-plank.png') repeat;
      background-size:64px 64px;
      padding:20px;
    }

    .header-bow { display:block; margin:0 auto 10px; max-width:80px; }
    h1 { text-align:center; color:#e63950; margin-bottom:20px; }

    #list { max-width:900px; margin:0 auto; display:grid; gap:10px; }

    .promise {
      display:flex; align-items:center; gap:12px;
      background:url('assets/nano/bg-plank.png');
      border:3px solid #2b0a0a;
      box-shadow:3px 3px 0 #2b0a0a;
      padding:12px;
      opacity:0;
      transform:translateY(20px);
    }

    .promise.reveal { opacity:1; transform:none; transition:.4s; }
    .promise img { width:24px; height:24px; image-rendering:pixelated; }

    .controls, .letter-wrap, .pinterest-wrap {
      max-width:900px;
      margin:20px auto 0;
    }

    #accept { opacity:.5; }

    #spotifyModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }

    #spotifyCard {
      width:min(92vw, 620px);
      background:#fff;
      padding:16px;
    }

    #spotifyFrame {
      width:100%;
      height:352px;
      border:0;
    }

    .pinterest-embed {
      width:100%;
      min-height:420px;
      border:3px solid #2b0a0a;
      box-shadow:3px 3px 0 #2b0a0a;
      background:#fff;
    }
  </style>
</head>

<body class="screen-base">

  <img src="assets/pinterest/ribbon-bow.png" class="header-bow" />
  <h1>MY PROMISES TO YOU</h1>

  <div id="list"></div>

  <div class="controls card">
    <label>Add your own promise:</label>

    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <input id="custom" class="pixel-input" />
      <button id="add" class="pixel-button">Add ➕</button>
      <button id="openSpotify" class="pixel-button">Open Spotify 💿</button>
    </div>

    <button id="accept" class="pixel-button" disabled>
      I accept all of this 💌
    </button>
  </div>

  <section class="letter-wrap card">
    <h2>HERE'S ALL I WANNA SAY.. 💌</h2>
    <p>There is something I gotta tell you for a very long time – I knew you since <span class="highlight">June 3 11:24 PM</span></p>
    <p>Every single day when I text you I feel good – everything feels lighter with you around.</p>
    <p>TELL ME – Can I be your boyfriend forever??? 🥀 &lt;3</p>
  </section>

  <section class="pinterest-wrap card">
    <iframe class="pinterest-embed" src="https://assets.pinterest.com/ext/embed.html?id=664281013793603120"></iframe>
  </section>

  <div id="spotifyModal">
    <div id="spotifyCard">
      <button id="closeSpotify">Close ✖</button>
      <iframe id="spotifyFrame"></iframe>
    </div>
  </div>

  <script>
    const basePromises = [
"I'll never cheat on you 💍","I promise to make myself better for you ✨","I'll comfort you whenever you feel sad 🧸","I'll correct myself if I'm wrong 💌","I'll never be toxic to you 🌸","I'll never change for anybody 🌟","I'll take care of you 🫶🏻","I'll text you good morning every day ☀️","I'll be your safe space when the world gets too loud 🤫","I'll laugh at your jokes even if they're terrible 😂","I'll support your dreams no matter what 🚀","I'll hold your hand when you're scared 🤝","I'll be your biggest cheerleader 📣","I'll fight for us when things get hard ⚔️","I'll be honest even when it's hard 🗣️","I'll choose you, always 💙","I'll remember the small things that matter 📝","I'll make you laugh until your stomach hurts 😆","I'll never let you feel alone 🌙","I'll be proud of you every single day 🌟"
    ];

    const list = document.getElementById('list');
    const checkState = new Map();

    function render(text,i){
      const row=document.createElement('div');
      row.className='promise';
      row.dataset.id=Date.now()+"-"+i;

      const p=document.createElement('div');
      p.textContent=text;

      row.append(p);

      row.onclick=()=>{
        const id=row.dataset.id;
        checkState.set(id,!checkState.get(id));
        validate();
      };

      list.appendChild(row);
    }

    basePromises.forEach(render);

    function validate(){
      const all=[...list.children];
      const ok=all.length && all.every(el=>checkState.get(el.dataset.id));
      accept.disabled=!ok;
    }

    openSpotify.onclick=()=>{
      spotifyModal.style.display='flex';
      spotifyFrame.src="https://open.spotify.com/embed/playlist/6h48LqwuHEgrCjrZmRCCGf";
    };

    closeSpotify.onclick=()=>spotifyModal.style.display='none';
  </script>

</body>
</html>
