<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Pixel Love</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="animations.css" />

  <style>
    #heart-tunnel, #three-scene { position: fixed; inset: 0; }
    #heart-tunnel { z-index: 0; overflow: hidden; }
    #three-scene { z-index: 2; }
    #ui { position: fixed; inset: 0; z-index: 4; display: grid; place-items: center; }
  </style>
</head>

<body class="screen-base">

  <div id="heart-tunnel"></div>
  <div id="three-scene"></div>
  <div id="floating-sprites"></div>

  <div id="ui">
    <div class="card pixel-title">Click the envelope 💌</div>
  </div>

  <div class="scanline-overlay"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script type="module" src="sounds.js"></script>
  <script src="config.js"></script>
  <script src="main.js"></script>

</body>
</html>
